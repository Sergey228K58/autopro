{% extends "base.html" %}

{% block content %}
<h2>Вход</h2>
<form method="POST" class="form">
    <label>Логин:</label>
    <input type="text" name="username" required>

    <label>Пароль:</label>
    <input type="password" name="password" required>

    <button type="submit">Войти</button>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</form>
{% endblock %}
